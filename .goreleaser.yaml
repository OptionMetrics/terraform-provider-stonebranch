# GoReleaser configuration for terraform-provider-stonebranch
# Based on HashiCorp's recommended configuration for Terraform providers
# Documentation: https://goreleaser.com

version: 2

before:
  hooks:
    - go mod tidy

builds:
  # Terraform provider build
  - id: terraform-provider-stonebranch
    binary: "{{ .ProjectName }}_v{{ .Version }}"
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - freebsd
      - linux
      - windows
    goarch:
      - amd64
      - arm
      - arm64
      - "386"
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64
      - goos: freebsd
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    flags:
      - -trimpath

  # sb2tf CLI utility build (experimental, separate from provider)
  - id: sb2tf
    main: ./cmd/sb2tf
    binary: sb2tf
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}

archives:
  # Provider archive
  - id: provider-zip
    ids:
      - terraform-provider-stonebranch
    formats:
      - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  # sb2tf archive (separate downloads)
  - id: sb2tf-zip
    ids:
      - sb2tf
    formats:
      - zip
    name_template: "sb2tf_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256
  extra_files:
    - glob: terraform-registry-manifest.json
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

# Publish to GitHub Releases
release:
  github:
    owner: OptionMetrics
    name: terraform-provider-stonebranch
  extra_files:
    - glob: terraform-registry-manifest.json
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
