          application/xml:
            schema:
              $ref: "#/components/schemas/ResumeAgentClusterWsData"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResponseWsData"
            application/xml:
              schema:
                $ref: "#/components/schemas/CommandResponseWsData"
        "400":
          description: Bad Request
          content:
            text/plain:
              example: Unable to parse JSON input.
  /resources/agentcluster/taskexecutionlimit:
    post:
      tags:
