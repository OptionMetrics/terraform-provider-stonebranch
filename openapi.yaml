openapi: 3.0.1
info:
  title: RESTful Web Services API
  description: Universal Controller supports a RESTful-based web services API that
    allows you to perform multiple operations.
  version: 7.9.1.0
externalDocs:
  description: RESTful Web Services API Documentation
  url: https://doc.stonebranch.com/wiki/spaces/UC79/pages/1614452510/RESTful+Web+Services+API
servers:
- url: ""
security:
- basicAuth: []
  bearerAuth: []
paths:
  /resources/agentcluster:
    get:
      tags:
      - Agent Cluster
      summary: Read an Agent Cluster
      description: Retrieves information on a specific Agent Cluster.
      operationId: getAgentCluster
      parameters:
      - name: agentclusterid
        in: query
        description: ID used within the Controller to identify this Agent Cluster.
        schema:
          type: string
      - name: agentclustername
        in: query
        description: Name used within the Controller to identify this Agent Cluster.
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentClusterWsData"
            application/xml:
              schema:
                $ref: "#/components/schemas/AgentClusterWsData"
        "400":
          description: Bad Request
          content:
            text/plain:
              example: Agent cluster value missing. Required either agentclustername
                or agentclusterid.
        "404":
          description: Not Found
          content:
            text/plain:
              example: Agent cluster with id "agentclusterid" does not exist.
    put:
      tags:
      - Agent Cluster
      summary: Modify an Agent Cluster
      description: Modifies the Agent Cluster specified by the sysId.
      operationId: updateAgentCluster
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentClusterWsData"
          application/xml:
            schema:
              $ref: "#/components/schemas/AgentClusterWsData"
      responses:
        "200":
          description: OK
          content:
            text/plain:
              example: Successfully updated the Agent Cluster with id "agentclusterid"
                to version "version".
        "400":
          description: Bad Request
          content:
            text/plain:
              example: Unable to parse JSON input.
        "404":
          description: Not Found
          content:
            text/plain:
              example: Agent cluster with id "agentclusterid" does not exist.
    post:
      tags:
      - Agent Cluster
      summary: Create an Agent Cluster
      description: Creates a new Agent Cluster.
      operationId: createAgentCluster
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentClusterWsData"
          application/xml:
            schema:
              $ref: "#/components/schemas/AgentClusterWsData"
      responses:
        "200":
          description: OK
          content:
            text/plain:
              example: Successfully created the Agent Cluster with id "agentclusterid".
        "400":
          description: Bad Request
          content:
            text/plain:
              example: Unable to parse JSON input.
        "404":
          description: Not Found
          content:
            text/plain:
              example: Create Agent Cluster failed. A duplicate value has been detected.
                Name must be unique.
    delete:
      tags:
      - Agent Cluster
      summary: Delete an Agent Cluster
      description: Deletes a specific Agent Cluster.
      operationId: deleteAgentCluster
      parameters:
      - name: agentclusterid
        in: query
        description: Name used within the Controller to identify this Agent Cluster.
        schema:
          type: string
      - name: agentclustername
        in: query
        description: ID used within the Controller to identify this Agent Cluster.
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            text/plain:
              example: Agent Cluster deleted successfully.
        "400":
          description: Bad Request
          content:
            text/plain:
              example: Required either agentclustername or agentclusterid.
        "404":
          description: Not Found
          content:
            text/plain:
              example: Agent cluster with id "agentclusterid" does not exist.
  /resources/agentcluster/list:
    get:
      tags:
      - Agent Cluster
      summary: List Agent Clusters
      description: Retrieves information on all Agent Clusters.
      operationId: getAgentClusters
      responses:
        "200":
          description: OK
          content:
            application/json:
