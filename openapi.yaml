  /resources/taskinstance/retrieveoutput:
    get:
      tags:
      - Task Instance
      summary: Retrieve Task Instance Output
      description: "Retrieves the output of a task instance. When Universal Controller\
        \ requests the output from the associated Agent, only the output type specified\
        \ by the outputtype property will be requested. However, the Universal Controller\
        \ response will also include any output previously associated with the task\
        \ instance in the database, regardless of output type."
      operationId: taskInstanceRetrieveOutput
      parameters:
      - name: taskinstancename
        in: query
        description: Name used within the Controller to identify this Task Instance.
        schema:
          type: string
      - name: taskinstanceid
        in: query
        description: ID used within the Controller to identify this Task Instance.
        schema:
          type: string
      - name: workflowinstancename
        in: query
        description: If taskinstancename is specified; Name used to identify the Workflow
          Task Instance containing this Task Instance.
        schema:
          type: string
      - name: criteria
        in: query
        description: If taskinstancename is specified; Specific task instance with
          this Task Instance Name. 1 = Oldest Active Instance. 2 = Newest Active Instance.
          3 = Oldest Instance. 4 = Newest Instance.
        schema:
          type: string
          default: "1"
      - name: outputtype
        in: query
        description: Type of task instance output to retrieve. 0 = OUTERR. 1 = STDOUT.
          2 = STDERR.
        schema:
          type: string
          default: "0"
      - name: startline
        in: query
        description: Indicates the line to begin retrieving output data.
        schema:
          type: string
          default: "1"
      - name: numlines
        in: query
        description: Number of lines to retrieve.
        schema:
          type: string
      - name: scantext
        in: query
        description: Scan the data for the text specified and retrieve only that.
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json: {}
            application/xml: {}
        "400":
          description: Bad Request
          content:
            text/plain:
              example: Mutual exclusion violation. Cannot specify task instance id
                and task instance name at the same time.
