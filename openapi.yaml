  /resources/universalevent/push/{eventName}:
    get:
      tags:
      - Universal Event
      summary: Push Universal Event
      description: "Provides an Inbound Webhook endpoint to publish Universal Events.<ul><li>ttl\
        \ and businessService (multi-value) query parameters specify the Universal\
        \ Event TTL and Member of Business Services, respectively.</li><li>All other\
        \ query parameters are captured as attributes with the exception of an access_token\
        \ query parameter.<ul><li>Any character in a query parameter name that is\
        \ not a letter or digit is converted to an underscore (_).</li></ul></li><li>All\
        \ headers are captured as attributes with the exception of authorization and\
        \ connection.<ul><li>Any character in a header name that is not a letter or\
        \ digit is converted to an underscore (_).</li></ul></li></ul>"
      operationId: pushg
      parameters:
      - name: eventName
        in: path
        description: Name used within the Controller to identify this Universal Event.
        required: true
        schema:
          type: string
      - name: payload
        in: query
        description: Equivalent to the request body for POST.
        schema:
          type: string
      - name: ttl
        in: query
        description: Time To Live for the Universal Event.
        schema:
          type: string
      - name: businessService
        in: query
        description: Business Services for the Universal Event.
        schema:
          type: array
          items:
            type: string
      responses:
        "200":
          description: OK
          content:
            text/plain:
              example: Universal Event "eventname" published.
        "400":
          description: Bad Request
          content:
            text/plain:
              example: Unable to parse JSON input.
        "404":
          description: Not Found
          content:
            text/plain:
              example: Universal Event Template "eventname" not found.
    post:
      tags:
      - Universal Event
      summary: Push Universal Event
      description: "Provides an Inbound Webhook endpoint to publish Universal Events.<ul><li>The\
        \ request body is captured as the payload attribute.</li><li>ttl and businessService\
        \ (multi-value) query parameters specify the Universal Event TTL and Member\
        \ of Business Services, respectively.</li><li>All other query parameters are\
        \ captured as attributes with the exception of an access_token query parameter.<ul><li>Any\
        \ character in a query parameter name that is not a letter or digit is converted\
        \ to an underscore (_).</li></ul></li><li>All headers are captured as attributes\
        \ with the exception of authorization and connection.<ul><li>Any character\
        \ in a header name that is not a letter or digit is converted to an underscore\
        \ (_).</li></ul></li></ul>"
      operationId: push
      parameters:
      - name: eventName
        in: path
        description: Name used within the Controller to identify this Universal Event.
        required: true
        schema:
          type: string
      - name: ttl
        in: query
        description: Time To Live for the Universal Event.
        schema:
          type: string
      - name: businessService
        in: query
        description: Business Services for the Universal Event.
        schema:
          type: array
          items:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: string
          application/xml:
            schema:
              type: string
          text/plain:
            schema:
              type: string
          text/xml:
            schema:
              type: string
      responses:
        "200":
          description: OK
          content:
            text/plain:
              example: Universal Event "eventname" published.
        "400":
          description: Bad Request
          content:
            text/plain:
              example: Unable to parse JSON input.
        "404":
          description: Not Found
          content:
            text/plain:
              example: Universal Event Template "eventname" not found.
