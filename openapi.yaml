components:
  schemas:
    AgentClusterJoinWsData:
      type: object
      properties:
        agentName:
          type: string
        membershipSuspended:
          type: boolean
        membershipSuspendedOn:
          type: string
        membershipResumedOn:
          type: string
        membershipDecommissioned:
          type: boolean
        sysId:
          type: string
        type:
          type: string
    AgentClusterNotificationsWsData:
      type: object
      properties:
        emailNotifications:
          type: array
          items:
            $ref: "#/components/schemas/EmailAgentClusterNotificationWsData"
        snmpNotifications:
          type: array
          items:
            $ref: "#/components/schemas/SnmpAgentClusterNotificationWsData"
    AgentClusterWsData:
      required:
      - type
      type: object
      properties:
        version:
          type: integer
          format: int32
          readOnly: true
          xml:
            attribute: true
        sysId:
