name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go build -v ./...

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -v -count=1 ./internal/client/...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: |
          test -z "$(gofmt -l .)" || (echo "Files not formatted:" && gofmt -l . && exit 1)

  acceptance-test:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, unit-test]
    timeout-minutes: 30
    env:
      TF_ACC: "1"
      STONEBRANCH_API_TOKEN: ${{ secrets.STONEBRANCH_API_TOKEN }}
      STONEBRANCH_BASE_URL: ${{ secrets.STONEBRANCH_BASE_URL }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - name: Verify credentials
        run: |
          if [ -z "$STONEBRANCH_API_TOKEN" ] || [ -z "$STONEBRANCH_BASE_URL" ]; then
            echo "Skipping acceptance tests: secrets not configured"
            exit 0
          fi
          echo "Credentials configured, running tests..."
      - name: Run acceptance tests
        if: env.STONEBRANCH_API_TOKEN != '' && env.STONEBRANCH_BASE_URL != ''
        run: go test -v -count=1 -timeout 20m ./internal/provider/...
